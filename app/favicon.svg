<svg viewBox="0 0 44 44" width="44" height="44" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="ringGrad" x1="0" y1="0" x2="44" y2="44" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#EF4444"/>
      <stop offset="100%" stop-color="#FBBF24"/>
    </linearGradient>
    <linearGradient id="redGrad" x1="22" y1="2" x2="22" y2="22" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#FF2B2B"/>
      <stop offset="100%" stop-color="#B91C1C"/>
    </linearGradient>
    <linearGradient id="darkGrad" x1="22" y1="22" x2="22" y2="42" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#1A1A2E"/>
      <stop offset="100%" stop-color="#0A0A14"/>
    </linearGradient>
    <clipPath id="topHalf">
      <rect x="0" y="0" width="44" height="22"/>
    </clipPath>
    <clipPath id="bottomHalf">
      <rect x="0" y="22" width="44" height="22"/>
    </clipPath>
  </defs>
  <!-- Outer glow ring -->
  <circle cx="22" cy="22" r="21" stroke="url(#ringGrad)" stroke-width="1.5" opacity="0.8"/>
  <!-- Top half rouge -->
  <circle cx="22" cy="22" r="20" fill="url(#redGrad)" clip-path="url(#topHalf)"/>
  <!-- Rayons -->
  <line x1="22" y1="22" x2="22" y2="4" stroke="rgba(255,255,255,0.12)" stroke-width="1" clip-path="url(#topHalf)"/>
  <line x1="22" y1="22" x2="31" y2="5.6" stroke="rgba(255,255,255,0.12)" stroke-width="1" clip-path="url(#topHalf)"/>
  <line x1="22" y1="22" x2="38.6" y2="13" stroke="rgba(255,255,255,0.12)" stroke-width="1" clip-path="url(#topHalf)"/>
  <line x1="22" y1="22" x2="40" y2="22" stroke="rgba(255,255,255,0.12)" stroke-width="1" clip-path="url(#topHalf)"/>
  <line x1="22" y1="22" x2="13" y2="5.6" stroke="rgba(255,255,255,0.12)" stroke-width="1" clip-path="url(#topHalf)"/>
  <line x1="22" y1="22" x2="5.4" y2="13" stroke="rgba(255,255,255,0.12)" stroke-width="1" clip-path="url(#topHalf)"/>
  <line x1="22" y1="22" x2="4" y2="22" stroke="rgba(255,255,255,0.12)" stroke-width="1" clip-path="url(#topHalf)"/>
  <!-- Bottom half sombre -->
  <circle cx="22" cy="22" r="20" fill="url(#darkGrad)" clip-path="url(#bottomHalf)"/>
  <!-- Bande centrale -->
  <rect x="2" y="19.5" width="40" height="5" fill="white" rx="0.5"/>
  <!-- Bouton -->
  <circle cx="22" cy="22" r="7" fill="white"/>
  <circle cx="22" cy="22" r="7" stroke="#1A1A2E" stroke-width="2" fill="none"/>
  <!-- Core -->
  <circle cx="22" cy="22" r="3.5" fill="url(#ringGrad)"/>
  <!-- Reflet -->
  <ellipse cx="21" cy="20" rx="1.5" ry="1" fill="white" opacity="0.6"/>
</svg>
